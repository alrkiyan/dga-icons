name: CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 11.9.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: 'https://registry.npmjs.org/'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate and Build
        run: |
          pnpm generate
          pnpm build
        env:
          NODE_OPTIONS: --max_old_space_size=8192

      # Guards the two failures that shipped in 0.1.0: an unresolved `workspace:`
      # specifier, and exports pointing at files the tarball does not contain.
      - name: Verify packages are installable
        run: pnpm verify:packs

      - name: Publish to npm
        if: env.NPM_TOKEN != ''
        run: pnpm -r publish --access public --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
